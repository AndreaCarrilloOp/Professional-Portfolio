  <meta name="theme-color" content="#E7F0FF" />
  <script>
    (() => {
      try {
        const storedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const useDark = storedTheme ? storedTheme === "dark" : prefersDark;
        const root = document.documentElement;

        root.classList.toggle("dark", useDark);
        root.dataset.theme = useDark ? "dark" : "light";
        root.style.colorScheme = useDark ? "dark" : "light";
        root.style.backgroundColor = useDark ? "#0B1026" : "#E7F0FF";
        document.querySelector('meta[name="theme-color"]')?.setAttribute(
          "content",
          useDark ? "#0B1026" : "#E7F0FF",
        );
      } catch {
        document.documentElement.style.backgroundColor = "#E7F0FF";
      }
    })();
  </script>
  <style>
    html { background: #E7F0FF; }
    html.dark,
    html[data-theme="dark"] { background: #0B1026; }
    body,
    #root { min-height: 100vh; background: transparent; }
